name: Release

# Push a tag like `v1.0.0` on `main` and this workflow publishes the same
# build artifact to both npm and ClawHub. The tag is the source of truth —
# the package.json version must match (the workflow refuses to publish if
# they drift). See RELEASING.md for the operator recipe.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0). Must already exist on main."
        required: true

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishing + ClawHub OIDC

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    name: publish to npm (Trusted Publishing)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (Trusted Publishing requires >=11.5.1)
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          TAG_RAW="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          TAG="${TAG_RAW#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version v$PKG"
            exit 1
          fi
          echo "OK: tag v$TAG matches package.json v$PKG"

      - name: Install dependencies (frozen lockfile)
        run: npm ci

      - name: Typecheck + build + test (regression gate)
        run: |
          npx tsc --noEmit
          npm run build
          npm run coverage

      - name: Preview the tarball
        run: |
          npm pack --dry-run
          npm pack
          ls -lh openclaw-hawkins-*.tgz

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public

      - name: Upload tarball as workflow artifact (audit)
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball-${{ github.ref_name }}
          path: openclaw-hawkins-*.tgz
          if-no-files-found: error

  publish-clawhub:
    name: publish to ClawHub
    needs: publish-npm
    permissions:
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@v0.15.0
    with:
      source: ${{ github.repository }}@${{ github.ref_name }}
      dry_run: false
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
