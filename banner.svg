<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="openclaw-hawkins — Everything is Connected">
  <!--
    openclaw-hawkins banner.
    Palette per docs/colors.json:
      pulseRed       #E60000
      voidBlack      #000000
      vascularMaroon #4A0E0E
    This is a deliberately minimal placeholder. Drop in a richer
    Stranger-Things-inspired composition when ready.
  -->
  <defs>
    <radialGradient id="pulse" cx="20%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#E60000" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#4A0E0E" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="vines" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4A0E0E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E60000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4A0E0E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="#000000"/>
  <rect width="1280" height="320" fill="url(#pulse)"/>

  <!-- Hive-mind node network on the left -->
  <g stroke="#E60000" stroke-width="1.5" fill="none" opacity="0.6">
    <circle cx="180" cy="160" r="42"/>
    <circle cx="120" cy="80"  r="14" fill="#E60000"/>
    <circle cx="260" cy="60"  r="10" fill="#4A0E0E"/>
    <circle cx="80"  cy="220" r="10" fill="#4A0E0E"/>
    <circle cx="260" cy="240" r="14" fill="#E60000"/>
    <circle cx="360" cy="150" r="12" fill="#4A0E0E"/>
    <line x1="180" y1="160" x2="120" y2="80"/>
    <line x1="180" y1="160" x2="260" y2="60"/>
    <line x1="180" y1="160" x2="80"  y2="220"/>
    <line x1="180" y1="160" x2="260" y2="240"/>
    <line x1="180" y1="160" x2="360" y2="150"/>
    <line x1="120" y1="80"  x2="260" y2="60"/>
    <line x1="80"  y1="220" x2="260" y2="240"/>
  </g>

  <!-- Sweep of Pulse Red light across the middle -->
  <rect x="440" y="135" width="780" height="2" fill="url(#vines)"/>

  <!-- Title -->
  <text x="460" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="62" font-weight="700" fill="#E60000" letter-spacing="-1">
    openclaw-hawkins
  </text>
  <text x="460" y="210" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="500" fill="#FFFFFF" opacity="0.92" letter-spacing="2.5">
    THE NEXUS · THE TENDRILS · THE HIVE
  </text>
  <text x="460" y="248" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-style="italic" fill="#FFFFFF" opacity="0.65">
    Everything is Connected.
  </text>

  <!-- Clock-face motif on the right -->
  <g transform="translate(1100,160)" stroke="#E60000" fill="none" opacity="0.75">
    <circle r="64" stroke-width="2"/>
    <circle r="3" fill="#E60000"/>
    <line x1="0" y1="0" x2="0"   y2="-46" stroke-width="3"/>
    <line x1="0" y1="0" x2="34"  y2="18"  stroke-width="2"/>
    <g stroke-width="1.5">
      <line x1="0"   y1="-58" x2="0"   y2="-50"/>
      <line x1="58"  y1="0"   x2="50"  y2="0"/>
      <line x1="0"   y1="58"  x2="0"   y2="50"/>
      <line x1="-58" y1="0"   x2="-50" y2="0"/>
    </g>
  </g>
</svg>
